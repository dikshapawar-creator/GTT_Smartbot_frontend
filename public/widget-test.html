<!DOCTYPE html>
<html>

<head>

    <style>
        body {

            background: linear-gradient(135deg, #f3e7e9 0%, #e3eeff 99%, #e3eeff 100%);

        button {
            padding: 12px 20px;
            font-size: 16px;

<body>

    <h1>Client Website Test Page</h1>

    <p>This page simulates a client website with its own background.</p>

    <button onclick="alert('Host site button works!')">

    <a href="#">Example Link</a>

    <p>Try clicking the button to verify the iframe does not block clicks outside the bottom-right corner.</p>

    <!-- GTD Smartbot Widget -->
    <iframe id="gtt-chatbot-iframe" src="http://localhost:3000/widget" style="
    position: fixed;
    bottom: 0;
    right: 0;

    overflow: hidden;
