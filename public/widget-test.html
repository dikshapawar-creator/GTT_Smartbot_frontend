<!DOCTYPE html>
<html>

<head>
    <title>Widget Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 40px;
            height: 2000px;
            background: linear-gradient(135deg, #f3e7e9 0%, #e3eeff 99%, #e3eeff 100%);
        }
    </style>
</head>

<body>

    <h1>Client Website Test Page</h1>
    <p>This page simulates a client website with its own background.</p>
    <a href="#">Example Link</a>

    <!-- Single test button on the right side -->
    <button onclick="alert('Right side button works!')" style="
        position: fixed;
        bottom: 140px;
        right: 20px;
        padding: 12px 20px;
        font-size: 15px;
        cursor: pointer;
        z-index: 10;
    ">
        Click Me
    </button>

    <!-- Smart Chatbot Widget — starts small (FAB only), expands on open -->
    <iframe id="gtt-chatbot-iframe" src="http://localhost:3000/widget" style="
            position: fixed;
            bottom: 0;
            right: 0;
            width: 120px;
            height: 120px;
            border: none;
            background: transparent;
            z-index: 2147483647;
            overflow: hidden;
            transition: width 0.3s ease, height 0.3s ease;
        " allowtransparency="true" allow="clipboard-write">
    </iframe>

    <script>
        window.addEventListener('message', function (e) {
            var iframe = document.getElementById('gtt-chatbot-iframe');
            if (!iframe) return;
            if (e.data && e.data.type === 'gtt-widget-resize') {
                if (e.data.open) {
                    iframe.style.width = '480px';
                    iframe.style.height = '620px';
                } else {
                    iframe.style.width = '120px';
                    iframe.style.height = '120px';
                }
            }
        });
    </script>

</body>

</html>
